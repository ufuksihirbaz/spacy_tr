      training/BOUN/model-best --paths.ner_model training/NER/model-best
  deps:
    - path: training/BOUN/model-best
      md5: 2eb399a4c93b6b5f9871325ca5028ea6
    - path: training/NER/model-best
      md5: 8edcf8abdc87009f8c161d48c3177406
  outs:
    - path: models/tr_core_news_trf-3.4.2
      md5: b4ae8f5d475787d197ca8003521408a9
package:
