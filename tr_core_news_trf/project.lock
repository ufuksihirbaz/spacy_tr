preprocess_ud:
  cmd: python -m weasel run preprocess_ud
  script:
    - mkdir -p corpus/BOUN
    - spacy convert ../datasets/UD/UD_Turkish-BOUN/tr_boun-ud-train.conllu corpus/BOUN  --converter
      conllu --n-sents 10 --merge-subtokens
    - spacy convert ../datasets/UD/UD_Turkish-BOUN/tr_boun-ud-test.conllu  corpus/BOUN
      --converter conllu --n-sents 10 --merge-subtokens
    - spacy convert ../datasets/UD/UD_Turkish-BOUN/tr_boun-ud-dev.conllu  corpus/BOUN
      --converter conllu --n-sents 10 --merge-subtokens
  deps:
    - path: ../datasets/UD/UD_Turkish-BOUN/tr_boun-ud-train.conllu
      md5: 3c299f7c3f4e8d805ff56e0c582327ba
    - path: ../datasets/UD/UD_Turkish-BOUN/tr_boun-ud-test.conllu
      md5: 671f9c42c7a23d0c11843855a0b86588
    - path: ../datasets/UD/UD_Turkish-BOUN/tr_boun-ud-dev.conllu
      md5: 8100507c12723495f04edc69fa778900
  outs:
    - path: corpus/BOUN/tr_boun-ud-train.spacy
      md5: 41ef6093697888503c8401508a8979d9
    - path: corpus/BOUN/tr_boun-ud-test.spacy
      md5: bb7df27343647ce2b80a36dc094c5db7
    - path: corpus/BOUN/tr_boun-ud-dev.spacy
      md5: 21bfb19c0c08e0f509ca3d518737775c
preprocess_ner:
  cmd: python -m weasel run preprocess_ner
  script:
    - mkdir -p corpus/NER
    - bash -c 'cat ../datasets/NER/XTREME/train.conll ../datasets/NER/TNEWSNER/train.conll
      > corpus/NER/train.conll'
    - bash -c 'cat ../datasets/NER/XTREME/dev.conll ../datasets/NER/TNEWSNER/dev.conll
      > corpus/NER/dev.conll'
    - bash -c 'cat ../datasets/NER/XTREME/test.conll ../datasets/NER/TNEWSNER/test.conll
      > corpus/NER/test.conll'
    - spacy convert corpus/NER/train.conll corpus/NER --converter ner --n-sents 10
    - spacy convert corpus/NER/dev.conll corpus/NER --converter ner --n-sents 10
    - spacy convert corpus/NER/test.conll corpus/NER --converter ner --n-sents 10
  deps:
    - path: ../datasets/NER/XTREME/train.conll
      md5: 866fa86f16c7845630d37fb785ec257e
    - path: ../datasets/NER/XTREME/test.conll
      md5: b3b53636850629b78d996bb6979e1f6b
